<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>코스믹 사칙연산 계산기</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* [CSS 공부용] 여기서부터 우주 테마 디자인이야! */
        
        body {
            /* 깊은 우주 배경색 (그라데이션) */
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron', sans-serif; /* 미래적인 폰트 적용 */
        }

        /* 계산기 전체 박스 (유리 질감 효과) */
        .calculator-container {
            background: rgba(255, 255, 255, 0.05); /* 반투명한 흰색 배경 */
            backdrop-filter: blur(15px); /* 배경을 흐릿하게 만드는 유리 효과 */
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            width: 320px;
        }

        h2 {
            color: #00ffff;
            text-align: center;
            font-size: 18px;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        /* 숫자 출력창 (네온 효과) */
        input[type="text"] {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid #00ffff;
            color: #00ffff;
            width: 100%;
            height: 60px;
            font-size: 24px;
            text-align: right;
            padding: 10px 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-sizing: border-box;
            /* 텍스트 쉐도우는 쓰지 않지만 박스 자체에 빛을 냅니다 */
            box-shadow: inset 0 0 10px rgba(0, 255, 255, 0.2);
        }

        /* 버튼들을 모아둔 박스 */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4열 정렬 */
            gap: 12px;
        }

        /* 기본 버튼 스타일 */
        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            height: 55px;
            border-radius: 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease; /* 부드러운 변화 */
        }

        /* 마우스를 올렸을 때 (Hover) */
        button:hover {
            background: #00ffff;
            color: #020617;
            box-shadow: 0 0 15px #00ffff;
            transform: translateY(-3px); /* 위로 살짝 떠오름 */
        }

        /* 연산자 버튼만 보라색 포인트 */
        .op {
            color: #8A2BE2;
            border-color: #8A2BE2;
        }
        
        .op:hover {
            background: #8A2BE2;
            color: white;
            box-shadow: 0 0 15px #8A2BE2;
        }

        /* 특수 버튼 (C, =) */
        .clear { color: #ff3b30; border-color: #ff3b30; }
        .equal { grid-column: span 1; background: rgba(0, 255, 255, 0.2); border-color: #00ffff; }
        
    </style>
</head>
<body>

    <div class="calculator-container">
        <h2>COSMIC SYSTEM v1.0</h2>

        <input type="text" readonly placeholder="0">
        
        <div class="button-grid">
            <button class="clear">C</button>
            <button class="op">÷</button>
            <button class="op">×</button>
            <button class="op">-</button>
            
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="op">+</button>
            
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="equal">=</button>
            
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button style="grid-column: span 2;">0</button>
            <button>.</button>
        </div>
    </div>

</body>
</html>
